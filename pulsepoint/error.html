<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PulsePoint CIS - Access Error</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/style.css">
  <script src="assets/app.js" defer></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center">
  <div class="card max-w-xl text-center">
    <h1 class="text-2xl font-bold mb-2">Access Denied</h1>
    <p class="muted mb-4">You do not have permission to view this page or your session has expired.</p>
    <div class="flex justify-center gap-4">
      <button id="homeBtn" class="px-4 py-2 bg-blue-600 text-white rounded">Go to Login</button>
      <button id="clearBtn" class="px-4 py-2 bg-red-100 text-red-700 rounded">Clear Session</button>
    </div>
  </div>

  <script>
    document.getElementById('homeBtn').addEventListener('click', ()=>{
      window.location.replace('index.html');
    });
    document.getElementById('clearBtn').addEventListener('click', ()=>{
      window.PP.deleteCookie('active_role');
      alert('Session cleared');
      window.location.replace('index.html');
    });
  </script>
</body>
</html>
